<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" preserveAspectRatio="xMidYMid slice">
  <!-- Modern Carnegie tartan, stylized.
       Dark forest green ground, navy primary stripe, gold and red accents,
       thin cream pencil stripes. Stripes are semi-transparent so vertical
       and horizontal bands blend at their intersections (the woven look). -->

  <!-- Forest ground -->
  <rect width="128" height="128" fill="#1f3d2a"/>

  <!-- Vertical bands (semi-transparent so horizontals blend in) -->
  <g fill-opacity="0.85">
    <rect x="14" y="0" width="6" height="128" fill="#0f1c33"/>
    <rect x="46" y="0" width="3" height="128" fill="#d4a64b"/>
    <rect x="66" y="0" width="3" height="128" fill="#9c2c2c"/>
    <rect x="92" y="0" width="6" height="128" fill="#0f1c33"/>
  </g>
  <!-- Vertical pencil stripes (cream) -->
  <g fill-opacity="0.7">
    <rect x="32" y="0" width="1" height="128" fill="#efe8d4"/>
    <rect x="108" y="0" width="1" height="128" fill="#efe8d4"/>
  </g>

  <!-- Horizontal bands (mirror of verticals — true tartans are
       symmetric, so the same sett runs both directions) -->
  <g fill-opacity="0.85">
    <rect x="0" y="14" width="128" height="6" fill="#0f1c33"/>
    <rect x="0" y="46" width="128" height="3" fill="#d4a64b"/>
    <rect x="0" y="66" width="128" height="3" fill="#9c2c2c"/>
    <rect x="0" y="92" width="128" height="6" fill="#0f1c33"/>
  </g>
  <g fill-opacity="0.7">
    <rect x="0" y="32" width="128" height="1" fill="#efe8d4"/>
    <rect x="0" y="108" width="128" height="1" fill="#efe8d4"/>
  </g>
</svg>
