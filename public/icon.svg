<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Carnegie bookplate identity icon. Forest plate, tartan headband
       across the top, gold inner frame, serif C centered. -->
  <rect width="512" height="512" rx="80" fill="#1f3d2a"/>

  <!-- Tartan headband across the top edge -->
  <g>
    <rect x="0" y="0" width="160" height="64" fill="#0f1c33"/>
    <rect x="160" y="0" width="40" height="64" fill="#d4a64b"/>
    <rect x="200" y="0" width="112" height="64" fill="#0f1c33"/>
    <rect x="312" y="0" width="40" height="64" fill="#9c2c2c"/>
    <rect x="352" y="0" width="160" height="64" fill="#0f1c33"/>
    <rect x="0" y="62" width="512" height="2" fill="#f3ecd6" fill-opacity="0.45"/>
  </g>

  <!-- Inner gold border, bookplate frame -->
  <rect x="56" y="104" width="400" height="368" rx="40" fill="none" stroke="#d4a64b" stroke-width="6" stroke-opacity="0.9"/>

  <!-- Serif C centered -->
  <text x="256" y="372" text-anchor="middle"
        font-family="Cormorant Garamond, EB Garamond, Georgia, serif"
        font-size="320" font-weight="600" fill="#f3ecd6" letter-spacing="-12">C</text>
</svg>
