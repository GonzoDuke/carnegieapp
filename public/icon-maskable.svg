<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Maskable Carnegie bookplate. Full-bleed forest ground, content
       in the safe ~40% center zone (Android masks with circle/squircle).
       Tartan headband and frame are positioned inside the safe zone so
       they survive the mask. -->
  <rect width="512" height="512" fill="#1f3d2a"/>

  <!-- Tartan headband, inset from edges so it survives the mask -->
  <g transform="translate(128 128)">
    <rect x="0" y="0" width="80" height="32" fill="#0f1c33"/>
    <rect x="80" y="0" width="20" height="32" fill="#d4a64b"/>
    <rect x="100" y="0" width="56" height="32" fill="#0f1c33"/>
    <rect x="156" y="0" width="20" height="32" fill="#9c2c2c"/>
    <rect x="176" y="0" width="80" height="32" fill="#0f1c33"/>
    <rect x="0" y="31" width="256" height="1" fill="#f3ecd6" fill-opacity="0.5"/>
  </g>

  <!-- Inner gold frame inside safe zone -->
  <rect x="148" y="180" width="216" height="200" rx="22" fill="none" stroke="#d4a64b" stroke-width="3.5" stroke-opacity="0.9"/>

  <!-- Serif C centered in safe zone -->
  <text x="256" y="332" text-anchor="middle"
        font-family="Cormorant Garamond, EB Garamond, Georgia, serif"
        font-size="180" font-weight="600" fill="#f3ecd6" letter-spacing="-6">C</text>
</svg>
